name: Build and Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build API image
        run: docker build -t event-rsvp-api:latest .

      - name: Build client image
        run: docker build -t event-rsvp-client:latest ./client

      - name: Save images
        run: |
          docker save event-rsvp-api:latest | gzip > api.tar.gz
          docker save event-rsvp-client:latest | gzip > client.tar.gz

      - name: Copy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "api.tar.gz,client.tar.gz,nginx.conf"
          target: ~/

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load images
            docker load < ~/api.tar.gz
            docker load < ~/client.tar.gz

            # Stop and remove old containers (including legacy names)
            docker stop event-rsvp-api event-rsvp-client my-devops-api my-devops-client my-devops-app || true
            docker rm event-rsvp-api event-rsvp-client my-devops-api my-devops-client my-devops-app || true

            # Ensure data directory exists
            mkdir -p ~/data

            # Start API
            docker run -d \
              --name event-rsvp-api \
              --restart unless-stopped \
              -p 3000:3000 \
              -v ~/data:/app/data \
              -e ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} \
              event-rsvp-api:latest

            # Start client
            docker run -d \
              --name event-rsvp-client \
              --restart unless-stopped \
              -p 3001:3000 \
              event-rsvp-client:latest

            # Update nginx and reload
            sudo cp ~/nginx.conf /etc/nginx/sites-available/default
            sudo nginx -t && sudo systemctl reload nginx

            # Clean up dangling images
            docker image prune -f

            # Verify both containers are running
            docker ps | grep event-rsvp

            # Health check
            sleep 5
            curl -f http://localhost:3000/health || exit 1
